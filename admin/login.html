<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — SmartSenior</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">

        <div class="login-brand">
          <div class="login-logo">S</div>
          <h1 class="login-title">SmartSenior</h1>
          <p class="login-subtitle">Admin Portal</p>
        </div>

        <div id="loginStatus" class="login-status hidden"></div>

        <form id="loginForm" autocomplete="on" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              placeholder="you@temple.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
          </div>

          <button id="signInBtn" type="submit" class="btn-primary">
            Sign In
          </button>
        </form>

        <button id="forgotBtn" type="button" class="btn-forgot">
          Forgot password?
        </button>

      </div>
    </div>

    <script type="module" src="js/login.js"></script>
  </body>
</html>
